<!doctype html>
<html>
  <head>
    <title>Face Recognition</title>
  </head>
  <body>
    <h2>Camera AI by Huy and Thanh</h2>
    <video id="video" width="300" autoplay></video>
    <br /><br />
    <button onclick="capture()">Chụp & Nhận diện</button>
    <canvas id="canvas" style="display: none"></canvas>
    <div id="result" style="font-size: 20px; margin-top: 20px"></div>
    <script>
      const video = document.getElementById("video");

      navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
        video.srcObject = stream;
      });

      function capture() {
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video, 0, 0);

        canvas.toBlob((blob) => {
          const formData = new FormData();
          formData.append("file", blob, "image.png");

          fetch("http://YOUR_IP:8000/recognize-face", {
            method: "POST",
            body: formData,
          })
            .then((res) => res.json())
            .then((data) => {
              const resultDiv = document.getElementById("result");

              if (data.faces && data.faces.length > 0) {
                let text = "";
                data.faces.forEach((face) => {
                  text += `👤 ${face.name} (${face.score.toFixed(2)})<br>`;
                });
                resultDiv.innerHTML = text;
              } else {
                resultDiv.innerHTML = "❌ Không nhận diện được";
              }
            });
        });
      }
    </script>
  </body>
</html>
